  <text x="1014" y="142" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e40af">2023 · GPT-4 + LLaMA</text>
  <text x="1014" y="154" text-anchor="middle" font-size="9" fill="#1e40af">开源反击 · RAG 爆发</text>
  <text x="1014" y="202" text-anchor="middle" font-size="9" fill="#78716c">2023</text>

  <!-- 2024 o1+MoE - minor -->
  <circle cx="1090" cy="190" r="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <line x1="1090" y1="183" x2="1090" y2="108" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="1026" y="88" width="128" height="34" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="1090" y="103" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e40af">2024 · o1 + MoE</text>
  <text x="1090" y="115" text-anchor="middle" font-size="9" fill="#1e40af">推理模型 · 长上下文</text>
  <text x="1090" y="202" text-anchor="middle" font-size="9" fill="#78716c">2024</text>

  <!-- 2025 DeepSeek - minor -->
  <circle cx="1150" cy="190" r="7" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
  <line x1="1150" y1="183" x2="1150" y2="148" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="1090" y="128" width="116" height="34" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="1148" y="142" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e40af">2025 · DeepSeek R1</text>
  <text x="1148" y="154" text-anchor="middle" font-size="9" fill="#1e40af">开源追平推理能力</text>
  <text x="1150" y="202" text-anchor="middle" font-size="9" fill="#78716c">2025</text>

  <!-- Legend -->
  <circle cx="72" cy="290" r="9" fill="#d97706" stroke="#92400e" stroke-width="1.5"/>
  <circle cx="72" cy="290" r="13" fill="none" stroke="#d97706" stroke-width="1" opacity="0.5"/>
  <text x="90" y="294" font-size="10" fill="#57534e">重大突破</text>
  <circle cx="170" cy="290" r="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="184" y="294" font-size="10" fill="#57534e">重要进展</text>
  <rect x="260" y="283" width="14" height="10" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="280" y="294" font-size="10" fill="#57534e">01-02 基础</text>
  <rect x="360" y="283" width="14" height="10" rx="2" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="380" y="294" font-size="10" fill="#57534e">03 Transformer</text>
  <rect x="470" y="283" width="14" height="10" rx="2" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
  <text x="490" y="294" font-size="10" fill="#57534e">04 LLM</text>
  <rect x="540" y="283" width="14" height="10" rx="2" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="560" y="294" font-size="10" fill="#57534e">05-06 RAG &amp; MLOps</text>
  <rect x="680" y="283" width="14" height="10" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="700" y="294" font-size="10" fill="#57534e">07 实战</text>

</svg>
