  <circle cx="328" cy="190" r="7" fill="#fef3c7" stroke="#d97706" stroke-width="1.8"/>
  <line x1="328" y1="183" x2="328" y2="148" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="268" y="128" width="120" height="34" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="328" y="142" text-anchor="middle" font-size="9.5" font-weight="600" fill="#92400e">2015 · ResNet</text>
  <text x="328" y="154" text-anchor="middle" font-size="9" fill="#92400e">残差连接解放深度</text>
  <text x="328" y="202" text-anchor="middle" font-size="9" fill="#78716c">2015</text>

