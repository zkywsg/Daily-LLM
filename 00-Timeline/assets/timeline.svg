  <circle cx="248" cy="190" r="7" fill="#fce7f3" stroke="#db2777" stroke-width="1.8"/>
  <line x1="248" y1="183" x2="248" y2="108" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="3,2"/>
