<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="340" fill="#fffbf7" rx="12"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1c1917">深度学习与大模型演进地图</text>
  <text x="600" y="54" text-anchor="middle" font-size="11" fill="#78716c">每一个技术的出现，背后都有一个"不得不解决"的问题</text>

  <!-- Phase bands (below axis) -->
  <!-- Phase 01-02: 2012-2016 -->
  <rect x="60" y="210" width="268" height="22" rx="4" fill="#fef3c7" opacity="0.8"/>
  <text x="194" y="225" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">01-02 · ML 基础 &amp; 神经网络</text>

  <!-- Phase 03: 2017-2019 -->
  <rect x="332" y="210" width="200" height="22" rx="4" fill="#fce7f3" opacity="0.8"/>
  <text x="432" y="225" text-anchor="middle" font-size="10" fill="#9d174d" font-weight="600">03 · NLP &amp; Transformer</text>

  <!-- Phase 04: 2020-2022 -->
  <rect x="536" y="210" width="264" height="22" rx="4" fill="#ecfdf5" opacity="0.8"/>
  <text x="668" y="225" text-anchor="middle" font-size="10" fill="#065f46" font-weight="600">04 · LLM Core</text>

  <!-- Phase 05-06: 2023-2024 -->
  <rect x="804" y="210" width="264" height="22" rx="4" fill="#fff7ed" opacity="0.8"/>
  <text x="936" y="225" text-anchor="middle" font-size="10" fill="#9a3412" font-weight="600">05-06 · RAG &amp; MLOps</text>

  <!-- Phase 07 -->
  <rect x="1072" y="210" width="96" height="22" rx="4" fill="#eff6ff" opacity="0.8"/>
  <text x="1120" y="225" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="600">07 · 实战</text>

  <!-- Main axis line -->
  <line x1="60" y1="190" x2="1160" y2="190" stroke="#d6d3d1" stroke-width="2.5"/>
  <!-- Arrow -->
  <polygon points="1160,186 1170,190 1160,194" fill="#d6d3d1"/>

  <!-- ── NODES ── -->
  <!-- Helper: major node = r10, minor = r7 -->

  <!-- 2012 AlexNet - MAJOR -->
  <circle cx="80" cy="190" r="11" fill="#d97706" stroke="#92400e" stroke-width="2"/>
  <circle cx="80" cy="190" r="16" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.5"/>
  <line x1="80" y1="174" x2="80" y2="130" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="16" y="108" width="128" height="38" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="80" y="123" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">2012 · AlexNet</text>
  <text x="80" y="137" text-anchor="middle" font-size="9" fill="#92400e">深度学习引爆点</text>
  <text x="80" y="197" text-anchor="middle" font-size="9" fill="#78716c" dy="12">2012</text>

  <!-- 2013 Word2Vec - minor -->
  <circle cx="170" cy="190" r="7" fill="#fce7f3" stroke="#db2777" stroke-width="1.8"/>
  <line x1="170" y1="183" x2="170" y2="148" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="112" y="128" width="116" height="34" rx="5" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="170" y="142" text-anchor="middle" font-size="9.5" font-weight="600" fill="#9d174d">2013 · Word2Vec</text>
  <text x="170" y="154" text-anchor="middle" font-size="9" fill="#9d174d">词语义向量化</text>
  <text x="170" y="202" text-anchor="middle" font-size="9" fill="#78716c">2013</text>

