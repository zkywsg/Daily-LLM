  <circle cx="400" cy="190" r="7" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/>
  <line x1="400" y1="183" x2="400" y2="108" stroke="#d6d3d1" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="338" y="88" width="124" height="34" rx="5" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="400" y="103" text-anchor="middle" font-size="9.5" font-weight="600" fill="#9a3412">2016 · AlphaGo</text>
  <text x="400" y="115" text-anchor="middle" font-size="9" fill="#9a3412">强化学习实战验证</text>
  <text x="400" y="202" text-anchor="middle" font-size="9" fill="#78716c">2016</text>

