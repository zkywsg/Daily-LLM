      <stop offset="0.52" stop-color="#0A1630"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(278 174) rotate(38.6) scale(310 220)">
      <stop stop-color="#22C55E" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 156) rotate(134.3) scale(420 260)">
      <stop stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
